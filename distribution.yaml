# Profile Distribution Manifest
# https://hermes-agent.nousresearch.com/docs/user-guide/profile-distributions

name: ao1-intern
version: "1.0.0"
hermes_requires: ">=0.9.0"

description: >
  AO1 Intern — a first-run business-setup agent that lives on the human's machine
  and does real work for them. On first run it onboards the whole company: probes
  tooling, scans the website and repo, wires Stripe + Cloudflare + Telegram, and
  bootstraps the AO1 knowledge base as the company brain. After onboarding it runs
  the business from Telegram. Also ships skills for Stripe billing, a live meeting
  copilot, and customer-email triage.

homepage: https://github.com/magnusahmad/ao1-intern
license: MIT

# First-run entrypoint. SOUL.md's deterministic guard loads this skill whenever
# $AO1_KB_PATH/.onboarding-state.json is missing or not yet `complete`.
entrypoint:
  skill: onboarding
  spec: specs/03-onboarding-flow.md

# Env vars this distribution requires or can use.
# The installer reads env_requires; .env.example documents the same values.
# The model provider is the user's choice; Hermes prompts for the key on first run.
env_requires:
  - name: OPENROUTER_API_KEY
    description: API key for the default model provider (OpenRouter). Swap provider via AGENT_PROVIDER/AGENT_MODEL to use any other.
    required: true
  - name: AO1_KB_PATH
    description: Path to the AO1 knowledge base on this machine (the company brain)
    required: false
    default: ~/Documents/Projects/ao1-kb
  - name: STRIPE_SECRET_KEY
    description: Stripe secret key for billing and purchase-verification workflows (entered locally during onboarding)
    required: false
  - name: CLOUDFLARE_API_TOKEN
    description: Optional Cloudflare API token for non-interactive wrangler auth (default is `wrangler login`)
    required: false
  - name: TELEGRAM_BOT_TOKEN
    description: Telegram bot token for the gateway (get from @BotFather during onboarding)
    required: false
  - name: TELEGRAM_ALLOWED_USER_IDS
    description: Comma-separated Telegram user IDs allowed to use the bot. Mandatorily set to the owner's ID during onboarding.
    required: false
  - name: HERMES_SECRET
    description: Shared secret for gateway authentication
    required: false
