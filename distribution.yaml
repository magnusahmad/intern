# Profile Distribution Manifest
# https://hermes-agent.nousresearch.com/docs/user-guide/profile-distributions

name: ao1-intern
version: "1.0.0"
hermes_version: ">=0.9.0"

description: >
  AO1 Intern — a general-purpose research and operations agent backed by a
  durable knowledge base. Handles KB-aware analysis, concept routing, research
  filing, repo work via swappable worker backends (Codex, Claude), and
  multi-repository coordination. Ships with Telegram gateway support.

homepage: https://github.com/magnusahmad/ao1-intern
license: MIT

# Env vars this distribution requires consumers to set.
# The installer copies .env.example -> .env and prompts for each key.
env_vars:
  - name: OPENROUTER_API_KEY
    description: API key for the default model provider (OpenRouter)
    required: true
  - name: TELEGRAM_BOT_TOKEN
    description: Telegram bot token for the gateway (get from @BotFather)
    required: false
  - name: AO1_KB_PATH
    description: Path to the AO1 knowledge base on this machine
    required: false
    default: ~/Documents/Projects/ao1-kb
  - name: HERMES_SECRET
    description: Shared secret for gateway authentication
    required: false