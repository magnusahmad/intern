<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-label="INTERN">
  <defs>
    <!-- CRT vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <!-- horizontal scanlines: 1px dark line every 3px -->
    <pattern id="scanlines" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000000" opacity="0.35"/>
    </pattern>
    <!-- warm phosphor glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.96
                0 0 0 0 0.92
                0 0 0 0 0.66
                0 0 0 0.8 0"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="720" height="200" fill="url(#vignette)"/>

  <!-- title: Courier New slab-serif, cream #FFFADE with pastel-yellow glow -->
  <g font-family="'Courier New', Courier, monospace" font-weight="700"
     font-size="132" letter-spacing="10"
     text-anchor="middle" dominant-baseline="middle">
    <text x="365" y="108" filter="url(#glow)" fill="#f5ebaa">INTERN</text>
    <text x="360" y="105" fill="#fffade">INTERN</text>
  </g>

  <!-- scanline overlay -->
  <rect width="720" height="200" fill="url(#scanlines)"/>
</svg>
