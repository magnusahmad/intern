# Intern — Base Configuration
# Consumer profiles install this via `hermes profile install`.
# Override any section by copying the key into your own profile config.yaml.

# Model provider is the user's choice. Defaults to OpenRouter (Hermes prompts for the key on
# first run); every value is env-overridable so a consumer can point at any provider/model.
# Onboarding does careful tool use, so pick a capable model.
model:
  default: ${AGENT_MODEL:-anthropic/claude-sonnet-4}
  provider: ${AGENT_PROVIDER:-openrouter}
  base_url: ${AGENT_BASE_URL:-https://openrouter.ai/api/v1}
  api_mode: ${AGENT_API_MODE:-chat_completions}

# All toolsets enabled — restrict per-platform via `hermes tools` after install.
toolsets:
  - all

agent:
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  tool_use_enforcement: auto
  task_completion_guidance: true
  environment_probe: true
  coding_context: auto
  gateway_timeout_warning: 900
  clarify_timeout: 600
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
  reasoning_effort: medium

terminal:
  backend: local
  modal_mode: auto
  timeout: 180
  auto_source_bashrc: true
  persistent_shell: true

# Website ingestion uses Hermes's shipped web-extract / browser-navigate / computer-use —
# no Firecrawl key dependency (spec 03 §4.5, §7.3). `auto` avoids requiring a Firecrawl key.
web:
  backend: ${WEB_BACKEND:-auto}

browser:
  inactivity_timeout: 120
  command_timeout: 30
  engine: auto
  dialog_policy: must_respond
  dialog_timeout_s: 300

checkpoints:
  enabled: false
  max_snapshots: 50
  retention_days: 7

file_read_max_chars: 100000

tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

compression:
  enabled: true
  threshold: 0.85
  target_ratio: 0.2
  protect_last_n: 20
  hygiene_hard_message_limit: 400
  protect_first_n: 3
  abort_on_summary_failure: false

prompt_caching:
  cache_ttl: 5m

openrouter:
  response_cache: true
  response_cache_ttl: 300
  min_coding_score: 0.65

auxiliary:
  vision:
    provider: auto
    timeout: 30
  web_extract:
    provider: auto
    timeout: 30
  compression:
    provider: auto
    model: google/gemini-3-flash-preview
    timeout: 120
  session_search:
    provider: auto
    timeout: 30
    max_concurrency: 3

display:
  compact: false
  show_reasoning: false
  streaming: false
  timestamps: false
  final_response_markdown: strip
  persistent_output: true
  persistent_output_max_lines: 200
  inline_diffs: true
  file_mutation_verifier: true
  turn_completion_explainer: true
  show_cost: false
  runtime_footer:
    enabled: false
    fields:
      - model
      - context_pct
      - cwd
  tool_progress: all
  background_process_notifications: all

tts:
  provider: edge

stt:
  enabled: true
  provider: local
  local:
    model: base

voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  beep_enabled: true

context:
  engine: compressor

memory:
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
  memory_char_limit: 2200
  user_char_limit: 1375

# Shell hooks — deterministic backstops at harness boundaries (see hooks/).
# pre_verify fires when the agent edited files and is about to finish; the
# onboarding backstop keeps the turn alive until the Phase 5 KB bootstrap is
# dispatched. hooks_auto_accept lets registration pass the first-use consent
# gate in non-TTY sessions (gateway, cron).
hooks_auto_accept: true
hooks:
  pre_verify:
    - command: "~/.hermes/profiles/intern/hooks/onboarding-kb-backstop.py"
      timeout: 10

# Subagent delegation (generic Hermes feature). Tune or disable as needed.
delegation:
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false
  default_toolsets:
    - terminal
    - file
    - web

skills:
  external_dirs: []
  template_vars: true
  inline_shell: false
  guard_agent_created: false
  write_approval: false
  creation_nudge_interval: 15

curator:
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  archive_after_days: 90
  prune_builtins: true
  backup:
    enabled: true
    keep: 5

approvals:
  mode: smart
  timeout: 60
  cron_mode: deny
  mcp_reload_confirm: true
  # Hard gates for a non-technical operator (spec 03 §4.6, §10). A non-coder will mostly
  # say "yes", so these dangerous actions ALWAYS require explicit confirmation regardless of
  # approval mode. The onboarding skill enforces the same posture deterministically.
  always_confirm:
    - "git push*"                 # never push unprompted; gh over HTTPS, no SSH
    - "git -c * push*"
    - "wrangler deploy*"          # no Cloudflare deploy during/around onboarding
    - "wrangler pages deploy*"
    - "wrangler pages publish*"
    - "stripe * create*"          # live Stripe writes
    - "stripe * update*"
    - "stripe * delete*"
    - 'curl * -X POST *api.stripe.com*'
    - 'curl * -X DELETE *api.stripe.com*'

# Telegram gateway — enable by setting TELEGRAM_BOT_TOKEN in .env
telegram:
  reactions: false

# Discord gateway config (disabled by default)
discord:
  require_mention: true
  auto_thread: true
  history_backfill: true
  reactions: true

slack:
  require_mention: true

mattermost:
  require_mention: true

matrix:
  require_mention: true

privacy:
  redact_pii: false